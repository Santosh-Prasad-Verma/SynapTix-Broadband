name: Build & Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: isp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        # Wait until postgres is ready to accept connections
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install PostgreSQL Client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Seed Database Schema
      run: |
        PGPASSWORD=postgres psql -h localhost -p 5435 -U postgres -d isp -f isp_postgres.sql

    - name: Build and Run Automated Tests
      run: |
        mvn clean test

    - name: Package Executable Fat JAR
      run: |
        mvn package -DskipTests

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ISP-Executable-Jar
        path: target/isp-management-1.0.0-jar-with-dependencies.jar
